name: Microsandbox Cloud CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --runInBand

      - name: Build TypeScript
        run: npm run build

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '^1.22'

      - name: Build SSH binaries (inject-sshd + ssh-gateway)
        run: npm run build:ssh
